# AI 写作程序配置 (仙侠修真版)

故事:
  标题: "天道问剑"
  类型: "仙侠, 玄幻"
  主题: "逆天改命, 我命由我不由天, 凡人修仙"
  预计长度: "长篇小说 (60章)"

章节设置:
  目标章数: 60
  每章小节数: 3
  每节字数限制: 2500

世界观:
  描述: >
    浩瀚的修真界，分为九州四海。
    宗门林立，强者为尊。灵气复苏的时代，妖魔并起。
    等级划分：炼气、筑基、金丹、元婴、化神、渡劫。
  规则:
    - 弱肉强食是基本法则。
    - 机缘与危险并存，上古遗迹中藏着惊天秘密。
    - 凡人如蝼蚁，修仙者视众生为草芥。

角色:
  主角:
    姓名: "林凡"
    描述: >
      18岁，青云宗杂役弟子，天生废灵根。
      性格坚韧不拔，心思缜密，睚眦必报。
      拥有一块神秘的黑色残玉，可加速灵草生长。
  配角:
    - 姓名: "苏清寒"
      描述: "宗门圣女，高冷如冰山雪莲，林凡名义上的师姐。"
    - 姓名: "胖胖"
      描述: "林凡的死党，贪吃但重义气，意外获得了蛮荒霸体传承。"
    - 姓名: "血魔老祖"
      描述: "被封印千年的大反派，残魂寄生在林凡识海中，亦师亦敌。"

风格:
  基调: "热血，苍凉，宏大，杀伐果断"
  视角: "第三人称有限视角 (林凡)"
  语言: "古风，用词考究，富有仙气"

# 自定义扩展
感情线:
  模式: "身份悬殊 -> 默默守护 -> 并肩作战 -> 举世为敌"
  关键道具: "一枚定情剑穗"
  雷点: "不写种马，单女主或无CP。"
  
剧情结构:
  第一幕: "潜龙在渊 (1-15章)"
  描述: "林凡在宗门底层隐忍修炼，利用残玉偷偷变强。在此期间结识配角，初露锋芒。"
  第二幕: "风云乍起 (16-35章)"
  描述: "宗门大比一鸣惊人，外出历练遭遇魔门追杀。发现世界真相的冰山一角。"
  第三幕: "天地不仁 (36-50章)"
  描述: "正魔大战爆发，宗门覆灭。林凡被迫流亡，在绝境中突破元婴。"
  第四幕: "问剑苍穹 (51-60章)"
  描述: "重铸肉身，杀回九州。揭开万古迷局，一人一剑，登顶巅峰。"

感官指南:
  视觉: "御剑飞行的流光，炸裂的法术特效，仙家福地的云雾缭绕，古战场的断壁残垣。"
  听觉: "剑鸣声，雷劫的轰鸣，悠远的钟声，风吹过竹林的萧瑟。"
  嗅觉: "丹药的清香，血腥味，灵茶的甘冽，尘封古洞的霉味。"
  关键意象: "断剑，残玉，飘落的桃花，漫天飞雪。"
