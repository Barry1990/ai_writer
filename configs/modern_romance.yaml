# AI 写作程序配置 (都市长篇版)

# 故事设定
故事:
  标题: "半程烟火"
  类型: "都市职场 / 豪门世家"
  主题: "成长, 势均力敌, 救赎"
  预计长度: "长篇小说 (60章)"

# 章节设置
章节设置:
  目标章数: 60
  每章小节数: 3
  每节字数限制: 2500

# 世界观 (背景设定)
世界观:
  描述: >
    以繁华的S市和古韵十足的B市为双城背景。
    涉及顶级建筑设计事务所、地产开发集团以及老城区改造项目。
    既有CBD的纸醉金迷，也有弄堂里的市井长情。
  规则:
    - 利益与情怀的冲突是常态。
    - 职场如战场，只有强者才能制定规则。
    - 即使在最冷硬的各种利益交换中，依然有人坚守初心。

# 角色
角色:
  主角:
    姓名: "温语"
    描述: >
      27岁，才华横溢但出身平凡的建筑设计师。
      性格外柔内刚，善于从废墟中发现美。
      因父亲的冤案，对资本力量充满警惕。
  配角:
    - 姓名: "傅言深"
      描述: "32岁，傅氏集团继承人，杀伐果断的地产大亨。患有严重的失眠症，唯有听到温语的声音能入睡。"
    - 姓名: "宋子川"
      描述: "温语的过往青梅竹马，如今的新锐律师，一直默默守护她。"
    - 姓名: "陈曼妮"
      描述: "当红女星，傅言深名义上的未婚妻（商业联姻），性格骄纵但本性不坏。"

# 写作风格
风格:
  基调: "现实，悬疑，浪漫，大开大合"
  视角: "第三人称全知视角 (侧重温语/傅言深双视角)"
  语言: "中文，精炼且富有画面感"

# 自定义扩展
# 自定义扩展
感情线:
  模式: "误会偏见 -> 互相利用 -> 灵魂共鸣 -> 携手破局"
  关键道具: "一座未完成的老建筑模型"
  雷点: "拒绝傻白甜，男女主都要有智商在线。"
  关键节点:
    - "第10章: 初次交锋，温语在竞标会上让傅言深吃瘪。"
    - "第25章: 暴雨夜被困工地，两人卸下伪装。"
    - "第40章: 家族旧案真相大白，两人关系降至冰点。"
    - "第55章: 联手反击商业阴谋，生死与共。"

# 剧情结构 (四幕式)
剧情结构:
  第一幕: "废墟上的野花 (1-15章)"
  描述: "温语回国，接手老城区改造项目，与傅言深因利益冲突而结识。针对与试探。"
  第二幕: "钢筋水泥丛林 (16-35章)"
  描述: "两人在合作中产生化学反应。家族旧恩怨逐渐浮出水面。感情升温但危机四伏。"
  第三幕: "崩塌 (36-50章)"
  描述: "真相揭开，误会爆发。温语众叛亲离，傅言深被迫在家族和爱人之间抉择。至暗时刻。"
  第四幕: "重建 (51-60章)"
  描述: "最后的反击。两人解开心结，共同完成梦想中的建筑。结局圆满。"

# 氛围与感官 (Writing Guide)
感官指南:
  视觉: "黑白灰的建筑草图 vs 霓虹闪烁的CBD夜景；旧弄堂的红砖青瓦 vs 落地窗前的冷雨。"
  听觉: "工地的轰鸣声，深夜画图时的铅笔沙沙声，爵士乐，暴雨敲击玻璃的声音。"
  嗅觉: "刚磨好的咖啡香，雨后泥土的腥气，昂贵的雪松味香水，陈旧木头的霉味。"
  关键意象: "未完成的模型，断裂的钢笔，在这个城市中孤独亮起的一盏灯。"

# 更多角色 (配角扩展)
配角扩展:
  - 姓名: "傅老爷子"
    描述: "傅家掌权人，看似退居二线，实则掌控一切。在这个故事中代表着旧势力的顽固与压迫。"
  - 姓名: "Jerry"
    描述: "温语的助理，00后，整顿职场的嘴替，负责调节气氛和提供年轻人的视角。"

