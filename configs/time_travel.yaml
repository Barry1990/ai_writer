# AI 写作程序配置 (穿越古言版)

故事:
  标题: "医妃倾天下"
  类型: "穿越, 宫斗, 权谋"
  主题: "现代医术vs古代权谋, 大女主, 爽文"
  预计长度: "长篇小说 (60章)"

章节设置:
  目标章数: 60
  每章小节数: 3
  每节字数限制: 2500

世界观:
  描述: >
    架空的大顺王朝。
    皇权旁落，世家把持朝政。
    虽然是古代背景，但因为女主的到来，出现了一些现代思想的火花。
  规则:
    - 皇权至上，但规矩是用来打破的。
    - 医术在乱世中是保命符，也是权力的敲门砖。
    - 后宅如战场，朝堂如炼狱。

角色:
  主角:
    姓名: "沈云初"
    描述: >
      24岁，现代顶尖外科医生，意外穿越成不受宠的侯府庶女。
      性格冷静理智，不仅有手术刀般的精准，也有雷霆手段。
      随身带着一个仅有的急救箱系统。
  配角:
    - 姓名: "萧景逸"
      描述: "摄政王，权倾朝野，在这个王朝中最危险的男人。身中奇毒，唯女主可解。"
    - 姓名: "白芷"
      描述: "忠心耿耿的贴身丫鬟，武力值MAX。"
    - 姓名: "苏子轩"
      描述: "温润如玉的神医谷少谷主，对女主的医术惊为天人。"

风格:
  基调: "爽文，权谋，高甜，打脸"
  视角: "第三人称有限视角 (沈云初)"
  语言: "古风与现代梗的碰撞，幽默诙谐"

# 自定义扩展
感情线:
  模式: "互相试探 -> 交易合作 -> 强强联手 -> 独宠一人"
  关键道具: "一把在这个时代惊世骇俗的手术刀"
  雷点: "拒绝圣母，有仇必报。"
  
剧情结构:
  第一幕: "侯府风波 (1-15章)"
  描述: "穿越醒来被陷害，利用医术在大宅门中站稳脚跟。初遇摄政王，达成交易。"
  第二幕: "名动京城 (16-35章)"
  描述: "开设医馆，救治权贵，名声大噪。卷入朝堂纷争，利用现代知识化解危机。"
  第三幕: "边疆烽火 (36-50章)"
  描述: "随军出征，在战场上不仅救死扶伤，更运筹帷幄。感情在生死中升华。"
  第四幕: "凤临天下 (51-60章)"
  描述: "回京肃清朝堂，辅佐男主登基，或携手归隐。实现一生一世一双人。"

感官指南:
  视觉: "繁复华丽的宫装，染血的白袍，手术时的无影灯光感（女主视角），万家灯火。"
  听觉: "宫廷丝竹，马蹄声，手术器械的碰撞声，朝堂上的争辩。"
  嗅觉: "浓郁的中药味，消毒水味（幻觉/系统），安神香，血腥气。"
  关键意象: "柳叶刀，红墙黄瓦，雪中的红梅，一纸婚书。"
