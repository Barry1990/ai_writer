# AI 写作程序配置 (赛博朋克版)

故事:
  标题: "霓虹尽头"
  类型: "科幻, 赛博朋克, 侦探"
  主题: "高科技低生活, 意识上传, 人性边界"
  预计长度: "长篇小说 (60章)"

章节设置:
  目标章数: 60
  每章小节数: 3
  每节字数限制: 2500

世界观:
  描述: >
    2077年的新夜之城（Night City）。
    巨型企业掌控一切，贫民窟与摩天大楼并存。
    义体改造普及，网络空间（Cyberspace）是第二世界。
  规则:
    - 数据就是金钱，信用点（Credits）决定生死。
    - 警察和黑帮的界限模糊。
    - 没有什么是不能被黑入的，包括你的大脑。

角色:
  主角:
    姓名: "V (薇)"
    描述: >
      28岁，前荒坂公司情报员，现为自由边缘行者（Edgerunner）。
      拥有高级骇客能力和军用级义眼。
      正在寻找关于“永生芯片”的真相。
  配角:
    - 姓名: "强尼"
      描述: "数字幽灵，以前的摇滚巨星/反抗领袖，只存在于V的脑机接口中。"
    - 姓名: "杰克"
      描述: "雇佣兵，强壮如牛的义体改造人，V最信任的搭档。"
    - 姓名: "田中博士"
      描述: "神秘的神经科学家，背叛了巨头企业，掌握着关键代码。"

风格:
  基调: "压抑，迷幻，暴力美学，反乌托邦"
  视角: "第三人称有限视角 (V)"
  语言: "冷硬派，包含大量科幻术语和街头黑话"

# 自定义扩展
感情线:
  模式: "末世相依 -> 灵魂共鸣 -> 殊途同归"
  关键道具: "一张承载着所有人记忆的芯片"
  雷点: "拒绝无脑突突突，要注重哲学思考。"
  
剧情结构:
  第一幕: "街头暗巷 (1-15章)"
  描述: "接受委托，潜入贫民窟的地下诊所。发现奇怪的数据异常。初次接触核心阴谋。"
  第二幕: "数据洪流 (16-35章)"
  描述: "与强尼的意识开始融合。对抗巨型企业的追捕。在网络空间展开惊心动魄的大战。"
  第三幕: "赛博精神病 (36-50章)"
  描述: "义体排异反应加剧，分不清现实与虚拟。身边的朋友接连牺牲。走向毁灭的边缘。"
  第四幕: "系统重启 (51-60章)"
  描述: "攻入荒坂塔顶层。做出最终选择：融入数字海洋还是作为凡人死去。"

感官指南:
  视觉: "致幻的霓虹灯，全息广告，不停歇的酸雨，金属义肢的冷光。"
  听觉: "合成器音乐（Synthwave），电流声，枪声，嘈杂的底特律方言。"
  嗅觉: "合成食物的廉价味，机油味，臭氧味，垃圾燃烧的焦味。"
  关键意象: "雨中的红伞，破碎的镜面护目镜，闪烁的服务器指示灯。"
